<style>
  :root {
    --accent:        #0095c8;
    --accent-light:  rgba(0,149,200,0.12);
    --accent-border: rgba(0,149,200,0.30);
    --cloud:         #2563eb;
    --cloud-light:   rgba(37,99,235,0.07);
    --cloud-border:  rgba(37,99,235,0.22);
    --text:          #1a1a2e;
    --text-muted:    #6b7280;
    --border:        #e5e7eb;
    --card-bg:       #f9fafb;
    --input-bg:      #ffffff;
    --bg:            #ffffff;
    --danger:        #dc2626;
    --danger-hover:  #b91c1c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent:        #00b4d8;
      --accent-light:  rgba(0,180,216,0.10);
      --accent-border: rgba(0,180,216,0.28);
      --cloud:         #60a5fa;
      --cloud-light:   rgba(96,165,250,0.08);
      --cloud-border:  rgba(96,165,250,0.22);
      --text:          #e2e8f0;
      --text-muted:    #94a3b8;
      --border:        #334155;
      --card-bg:       rgba(255,255,255,0.05);
      --input-bg:      rgba(255,255,255,0.08);
      --bg:            transparent;
      --danger:        #f87171;
      --danger-hover:  #ef4444;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px; color: var(--text); background: var(--bg) !important;
  }

  /* ── Form elements ── */
  .fg { margin-bottom: 14px; }
  label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--text); }
  .hint { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; line-height: 1.4; }
  input[type="text"], input[type="number"], input[type="email"], input[type="password"], select {
    width: 100%; height: 36px; padding: 0 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; background: var(--input-bg);
    color: var(--text); transition: border-color .15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  select option { background: var(--input-bg); color: var(--text); }

  /* ── Buttons ── */
  .btn {
    padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: opacity .15s, background .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-outline  { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-outline:hover { background: var(--accent); color: #fff; opacity: 1; }
  .btn-danger   { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; opacity: 1; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* ── Global MiCloud card ── */
  .global-card {
    border: 1.5px solid var(--cloud-border); border-radius: 12px;
    margin-bottom: 20px; background: var(--cloud-light); overflow: hidden;
  }
  .global-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 18px; cursor: pointer; user-select: none;
  }
  .global-header:hover { opacity: .88; }
  .global-header-left { display: flex; align-items: center; gap: 9px; }
  .global-title { font-size: 14px; font-weight: 700; color: var(--cloud); }
  .global-body { padding: 16px 18px 20px; border-top: 1px solid var(--cloud-border); }
  .global-body.collapsed { display: none; }

  /* ── Device card ── */
  .device-card {
    border: 1.5px solid var(--accent-border); border-radius: 12px;
    margin-bottom: 16px; background: var(--accent-light); overflow: hidden;
  }
  .device-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 18px; cursor: pointer; user-select: none;
  }
  .device-header:hover { opacity: .88; }
  .device-header-left { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
  .chevron {
    font-size: 11px; color: var(--text-muted); transition: transform .2s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(90deg); }
  .dev-name { font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .model-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .4px;
    padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    background: var(--accent-light); color: var(--accent);
    border: 1px solid var(--accent-border);
    font-family: 'SF Mono', 'Fira Mono', monospace;
  }
  .status-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .5px;
    padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    text-transform: uppercase;
  }
  .status-badge.enabled  { background: rgba(22,163,74,0.10); color: #16a34a; border: 1px solid rgba(22,163,74,0.30); }
  .status-badge.disabled { background: rgba(220,38,38,0.08); color: var(--danger); border: 1px solid rgba(220,38,38,0.22); }
  .dev-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  .device-body { padding: 16px 18px 20px; border-top: 1px solid var(--accent-border); }
  .device-body.collapsed { display: none; }

  /* ── Grid layouts ── */
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ── Section divider ── */
  .section-hd {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: var(--text-muted);
    margin: 18px 0 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Fieldset ── */
  .fieldset {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-top: 4px;
  }

  /* ── Toggle grid (checkboxes) ── */
  .toggle-rows { display: flex; flex-direction: column; gap: 8px; }
  .toggle-row  { display: flex; gap: 8px; }
  .toggle-item {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card-bg);
    cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .toggle-item:hover { border-color: var(--accent); }
  .toggle-item input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer;
  }
  .toggle-item.checked {
    border-color: var(--accent-border); background: var(--accent-light);
  }

  /* ── Override fieldset toggle ── */
  .override-toggle {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; cursor: pointer;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
  }
  .override-toggle input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer;
  }
  .override-fieldset { margin-top: 0; }

  /* ── Advanced toggle ── */
  .advanced-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 16px; margin-bottom: 8px; cursor: pointer;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .7px; color: var(--text-muted);
    background: none; border: none; padding: 0;
  }
  .advanced-toggle:hover { color: var(--accent); }
  .adv-chevron { font-size: 10px; transition: transform .2s; }
  .adv-chevron.open { transform: rotate(90deg); }

  /* ── Actions row ── */
  .actions { margin-top: 18px; display: flex; gap: 10px; }

  /* ── Discover button + result ── */
  .discover-row { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .discover-msg {
    font-size: 12px; padding: 8px 12px; border-radius: 6px;
    display: none;
  }
  .discover-msg.ok   { background: rgba(22,163,74,0.10); color: #16a34a; border: 1px solid rgba(22,163,74,0.28); }
  .discover-msg.err  { background: rgba(220,38,38,0.08); color: var(--danger); border: 1px solid rgba(220,38,38,0.22); }
  .discover-msg.info { background: var(--cloud-light); color: var(--cloud); border: 1px solid var(--cloud-border); }
  .btn-cloud  { background: var(--cloud); color: #fff; }
  .btn-cloud:hover { opacity: .85; }
</style>

<div id="app"></div>

<script>
(async () => {
  let t = {};
  async function loadTranslations() {
    let lang = 'en';
    try { lang = await homebridge.i18nCurrentLang(); } catch {}
    const tryLangs = [lang, lang.split('-')[0], 'en'];
    for (const l of tryLangs) {
      try {
        const res = await fetch(`./i18n/${l}.json`);
        if (res.ok) { t = await res.json(); return; }
      } catch {}
    }
    try {
      const res = await fetch('./i18n/en.json');
      t = await res.json();
    } catch {}
  }
  await loadTranslations();

  let config = {};
  try {
    const cfgs = await homebridge.getPluginConfig();
    config = cfgs[0] || {};
  } catch {}
  if (!config.micloud)  config.micloud  = {};
  if (!config.devices)  config.devices  = [];

  const expanded        = new Set();
  const advExpanded     = new Set();
  let   globalExpanded  = true;
  const app = document.getElementById('app');

  /* ── Helpers ── */
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s ?? '');
    return d.innerHTML.replace(/"/g, '&quot;');
  }
  function bool(v, def = true)  { return v === undefined ? def : !!v; }
  function boolF(v, def = false) { return v === undefined ? def : !!v; }
  async function save() { await homebridge.updatePluginConfig([config]); }

  const COUNTRIES = ['cn','de','sg','tw','us','ru','in','i2'];
  function countryName(code) {
    return (t.countryNames && t.countryNames[code]) || code;
  }
  function countryOptions(selected) {
    return COUNTRIES.map(c =>
      `<option value="${c}" ${selected === c ? 'selected' : ''}>${esc(countryName(c))}</option>`
    ).join('');
  }

  /* ── Render ── */
  function render() {
    const mc = config.micloud || {};
    app.innerHTML = `
      <!-- Global MiCloud -->
      <div class="global-card">
        <div class="global-header" id="global-toggle">
          <div class="global-header-left">
            <span class="chevron ${globalExpanded ? 'open' : ''}">&#9654;</span>
            <span class="global-title">&#9729;&#65039; ${t.globalMiCloud || 'Global MiCloud'}</span>
          </div>
        </div>
        <div class="global-body ${globalExpanded ? '' : 'collapsed'}">
          <div class="hint" style="margin-bottom:12px">${t.globalMiCloudHint || 'Shared MiCloud credentials used by all devices (can be overridden per device).'}</div>
          <div class="row-2">
            <div class="fg">
              <label>${t.username || 'Username'}</label>
              <input type="text" id="g-username" value="${esc(mc.username || '')}">
            </div>
            <div class="fg">
              <label>${t.password || 'Password'}</label>
              <input type="password" id="g-password" value="${esc(mc.password || '')}">
            </div>
          </div>
          <div class="row-2">
            <div class="fg" style="margin-bottom:0">
              <label>${t.country || 'Country'}</label>
              <select id="g-country">${countryOptions(mc.country || 'cn')}</select>
            </div>
            <div class="fg" style="margin-bottom:0; display:flex; align-items:flex-end;">
              <label class="toggle-item ${bool(mc.forceMiCloud, false) ? 'checked' : ''}" style="width:100%; margin-bottom:0; justify-content:flex-start; gap:7px">
                <input type="checkbox" id="g-forceMiCloud" ${bool(mc.forceMiCloud, false) ? 'checked' : ''}>
                ${t.forceMiCloud || 'Force MiCloud'}
              </label>
            </div>
          </div>
          <div class="hint" style="margin-top:6px">${t.forceMiCloudHint || 'Use MiCloud even for devices that support local connection.'}</div>

          <div class="discover-row">
            <button class="btn btn-cloud" id="btn-discover">&#128270; ${t.discoverBtn || 'Discover Devices'}</button>
            <div class="hint">${t.discoverHint || 'Auto-discover all Xiaomi devices linked to your MiCloud account.'}</div>
            <div class="discover-msg" id="discover-msg"></div>
          </div>
        </div>
      </div>

      <!-- Devices -->
      <div class="section-hd" style="margin-top:4px">${t.devices || 'Devices'}</div>
      <div id="device-list">
        ${config.devices.map((d, i) => renderDevice(d, i)).join('')}
      </div>
      <div class="actions">
        <button class="btn btn-outline" id="btn-add">+ ${t.addDevice || 'Add Device'}</button>
      </div>
    `;
    bindEvents();
  }

  function renderDevice(d, i) {
    const isOpen    = expanded.has(i);
    const advOpen   = advExpanded.has(i);
    const name      = d.name  || `Device #${i + 1}`;
    const model     = d.model || '';
    const enabled   = bool(d.deviceEnabled, true);
    const poll      = d.pollingInterval !== undefined ? d.pollingInterval : 10000;
    const hasOvr    = boolF(d._micloudOverride);
    const ovrMc     = d.micloud || {};

    return `
      <div class="device-card" id="dev-card-${i}">
        <div class="device-header device-toggle" data-i="${i}">
          <div class="device-header-left">
            <span class="chevron ${isOpen ? 'open' : ''}">&#9654;</span>
            <span class="dev-name">${esc(name)}</span>
            ${model ? `<span class="model-badge">${esc(model)}</span>` : ''}
            <span class="status-badge ${enabled ? 'enabled' : 'disabled'}">${enabled ? (t.deviceEnabled || 'Enabled') : (t.deviceDisabled || 'Disabled')}</span>
            ${!isOpen ? `<span class="dev-meta">${esc(d.ip || '—')} &middot; ${model || '—'} &middot; ${poll}ms</span>` : ''}
          </div>
          <div style="flex-shrink:0; margin-left:8px">
            <button class="btn btn-danger btn-sm btn-remove" data-i="${i}">${t.remove || 'Remove'}</button>
          </div>
        </div>

        <div class="device-body ${isOpen ? '' : 'collapsed'}">

          <!-- Row 1: Device Name -->
          <div class="fg">
            <label>${t.deviceName || 'Device Name'}</label>
            <input type="text" class="d-field" data-i="${i}" data-f="name" value="${esc(d.name || '')}">
          </div>

          <!-- Row 2: IP + Token -->
          <div class="row-2">
            <div class="fg">
              <label>${t.ip || 'IP Address'}</label>
              <div class="hint">${t.ipHint || 'Local IP address of the device (e.g. 192.168.1.100)'}</div>
              <input type="text" class="d-field" data-i="${i}" data-f="ip" value="${esc(d.ip || '')}" placeholder="192.168.1.100">
            </div>
            <div class="fg">
              <label>${t.token || 'Token'}</label>
              <div class="hint">${t.tokenHint || '32-character MiOT token.'}</div>
              <input type="password" class="d-field" data-i="${i}" data-f="token" value="${esc(d.token || '')}">
            </div>
          </div>

          <!-- Optional: Model + Device ID -->
          <div class="row-2">
            <div class="fg">
              <label>${t.model || 'Model'} <span style="font-weight:400;color:var(--text-muted)">(${t.optional || 'optional'})</span></label>
              <div class="hint">${t.modelHint || 'Device model identifier (e.g. dmaker.fan.p5). Leave empty for auto-detect.'}</div>
              <input type="text" class="d-field" data-i="${i}" data-f="model" value="${esc(d.model || '')}" placeholder="dmaker.fan.p5">
            </div>
            <div class="fg">
              <label>${t.deviceId || 'Device ID'} <span style="font-weight:400;color:var(--text-muted)">(${t.optional || 'optional'})</span></label>
              <div class="hint">${t.deviceIdHint || 'Leave empty for auto-detect.'}</div>
              <input type="text" class="d-field" data-i="${i}" data-f="deviceId" value="${esc(d.deviceId || '')}" placeholder="auto-detect">
            </div>
          </div>

          <!-- MiCloud Override -->
          <div class="section-hd">${t.micloudOverride || 'MiCloud Override'}</div>
          <label class="override-toggle">
            <input type="checkbox" class="ovr-toggle-cb" data-i="${i}" ${hasOvr ? 'checked' : ''}>
            ${t.micloudOverrideHint || 'Override global MiCloud credentials for this device only.'}
          </label>
          <div id="ovr-fields-${i}" style="${hasOvr ? '' : 'display:none'}">
            <div class="fieldset override-fieldset">
              <div class="row-2">
                <div class="fg">
                  <label>${t.username || 'Username'}</label>
                  <input type="text" class="ovr-field" data-i="${i}" data-f="username" value="${esc(ovrMc.username || '')}">
                </div>
                <div class="fg">
                  <label>${t.password || 'Password'}</label>
                  <input type="password" class="ovr-field" data-i="${i}" data-f="password" value="${esc(ovrMc.password || '')}">
                </div>
              </div>
              <div class="fg" style="margin-bottom:0">
                <label>${t.country || 'Country'}</label>
                <select class="ovr-field" data-i="${i}" data-f="country">
                  ${countryOptions(ovrMc.country || 'cn')}
                </select>
              </div>
            </div>
          </div>

          <!-- Options -->
          <div class="section-hd">${t.settings || 'Settings'}</div>
          <div class="row-2">
            <div class="fg" style="margin-bottom:0">
              <label>${t.pollingInterval || 'Polling Interval (ms)'}</label>
              <div class="hint">${t.pollingIntervalHint || 'How often to poll the device for updates (milliseconds).'}</div>
              <input type="number" class="d-field" data-i="${i}" data-f="pollingInterval" min="1000" max="300000" value="${poll}">
            </div>
            <div class="fg" style="margin-bottom:0; display:flex; align-items:flex-end; gap:8px; flex-direction:column; justify-content:flex-end;">
              <div class="toggle-rows" style="width:100%">
                <div class="toggle-row">
                  <label class="toggle-item ${bool(d.deviceEnabled, true) ? 'checked' : ''}">
                    <input type="checkbox" class="d-bool-field" data-i="${i}" data-f="deviceEnabled" ${bool(d.deviceEnabled, true) ? 'checked' : ''}>
                    ${t.deviceEnabled || 'Device Enabled'}
                  </label>
                  <label class="toggle-item ${boolF(d.customAccessory) ? 'checked' : ''}">
                    <input type="checkbox" class="d-bool-field" data-i="${i}" data-f="customAccessory" ${boolF(d.customAccessory) ? 'checked' : ''}>
                    ${t.customAccessory || 'Custom Accessory'}
                  </label>
                </div>
              </div>
            </div>
          </div>

          <!-- Advanced -->
          <button class="advanced-toggle adv-toggle-btn" data-i="${i}">
            <span class="adv-chevron ${advOpen ? 'open' : ''}">&#9654;</span>
            ${t.advanced || 'Advanced'}
          </button>
          <div id="adv-sec-${i}" style="${advOpen ? '' : 'display:none'}">
            <div class="toggle-rows">
              <div class="toggle-row">
                <label class="toggle-item ${boolF(d.silentLog) ? 'checked' : ''}">
                  <input type="checkbox" class="d-bool-field" data-i="${i}" data-f="silentLog" ${boolF(d.silentLog) ? 'checked' : ''}>
                  ${t.silentLog || 'Silent Log'}
                </label>
                <label class="toggle-item ${boolF(d.deepDebugLog) ? 'checked' : ''}">
                  <input type="checkbox" class="d-bool-field" data-i="${i}" data-f="deepDebugLog" ${boolF(d.deepDebugLog) ? 'checked' : ''}>
                  ${t.deepDebugLog || 'Deep Debug Log'}
                </label>
              </div>
            </div>
          </div>

        </div>
      </div>
    `;
  }

  /* ── Event binding ── */
  function bindEvents() {
    /* Global MiCloud toggle */
    document.getElementById('global-toggle').addEventListener('click', () => {
      globalExpanded = !globalExpanded;
      render();
    });

    /* Global MiCloud fields */
    const gUsername = document.getElementById('g-username');
    const gPassword = document.getElementById('g-password');
    const gCountry  = document.getElementById('g-country');
    const gForce    = document.getElementById('g-forceMiCloud');
    if (gUsername) gUsername.addEventListener('change', () => { config.micloud.username = gUsername.value; save(); });
    if (gPassword) gPassword.addEventListener('change', () => { config.micloud.password = gPassword.value; save(); });
    if (gCountry)  gCountry.addEventListener('change',  () => { config.micloud.country  = gCountry.value;  save(); });
    if (gForce) {
      gForce.addEventListener('change', () => {
        config.micloud.forceMiCloud = gForce.checked;
        gForce.closest('.toggle-item').classList.toggle('checked', gForce.checked);
        save();
      });
    }

    /* Discover devices */
    const discoverBtn = document.getElementById('btn-discover');
    const discoverMsg = document.getElementById('discover-msg');
    if (discoverBtn && discoverMsg) {
      discoverBtn.addEventListener('click', async () => {
        const username = gUsername ? gUsername.value.trim() : (config.micloud.username || '');
        const password = gPassword ? gPassword.value.trim() : (config.micloud.password || '');
        const country  = gCountry  ? gCountry.value  : (config.micloud.country  || 'cn');
        if (!username || !password) {
          discoverMsg.className = 'discover-msg err';
          discoverMsg.style.display = '';
          discoverMsg.textContent = '⚠️ ' + (t.username || 'Username') + ' & ' + (t.password || 'Password') + ' required.';
          return;
        }
        discoverBtn.disabled = true;
        discoverBtn.textContent = '⏳ ' + (t.discovering || 'Discovering…');
        discoverMsg.className = 'discover-msg info';
        discoverMsg.style.display = '';
        discoverMsg.textContent = t.discovering || 'Discovering…';
        try {
          const res = await homebridge.request('/discover', { username, password, country });
          const found = (res && res.devices) ? res.devices : [];
          if (found.length === 0) {
            discoverMsg.className = 'discover-msg err';
            discoverMsg.textContent = '🔍 ' + (t.discoverEmpty || 'No devices found.');
          } else {
            const existingIps = new Set(config.devices.map(d => d.ip).filter(Boolean));
            let added = 0;
            for (const d of found) {
              if (d.localip && existingIps.has(d.localip)) continue;
              config.devices.push({
                name:            d.name || d.model || 'Xiaomi Device',
                ip:              d.localip || '',
                token:           d.token  || '',
                model:           d.model  || '',
                deviceId:        d.did    || '',
                pollingInterval: 10000,
                deviceEnabled:   true,
                customAccessory: false,
                silentLog:       false,
                deepDebugLog:    false,
                _micloudOverride: false,
                micloud:         {},
              });
              if (d.localip) existingIps.add(d.localip);
              added++;
            }
            const msg = (t.discoverSuccess || 'Found {n} device(s). {added} new added.')
              .replace('{n}', found.length).replace('{added}', added);
            discoverMsg.className = 'discover-msg ok';
            discoverMsg.textContent = '✅ ' + msg;
            if (added > 0) { render(); save(); }
          }
        } catch (err) {
          discoverMsg.className = 'discover-msg err';
          discoverMsg.textContent = '❌ ' + (t.discoverError || 'Discovery failed') + ': ' + (err.message || err);
        } finally {
          discoverBtn.disabled = false;
          discoverBtn.innerHTML = '&#128270; ' + (t.discoverBtn || 'Discover Devices');
        }
      });
    }

    /* Collapse device toggle */
    document.querySelectorAll('.device-toggle').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.closest('.btn, input, select, button.advanced-toggle, button.adv-toggle-btn')) return;
        const i = +el.dataset.i;
        expanded.has(i) ? expanded.delete(i) : expanded.add(i);
        render();
      });
    });

    /* Add device */
    document.getElementById('btn-add').addEventListener('click', () => {
      const i = config.devices.length;
      config.devices.push({
        name: '', ip: '', token: '', model: '', deviceId: '',
        pollingInterval: 10000,
        deviceEnabled: true,
        customAccessory: false,
        silentLog: false,
        deepDebugLog: false,
        _micloudOverride: false,
        micloud: {},
      });
      expanded.add(i);
      render(); save();
    });

    /* Remove device */
    document.querySelectorAll('.btn-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const i = +btn.dataset.i;
        config.devices.splice(i, 1);
        const newExp = new Set();
        expanded.forEach(v => { if (v < i) newExp.add(v); else if (v > i) newExp.add(v - 1); });
        const newAdv = new Set();
        advExpanded.forEach(v => { if (v < i) newAdv.add(v); else if (v > i) newAdv.add(v - 1); });
        expanded.clear(); newExp.forEach(v => expanded.add(v));
        advExpanded.clear(); newAdv.forEach(v => advExpanded.add(v));
        render(); save();
      });
    });

    /* Device string/number fields */
    document.querySelectorAll('.d-field').forEach(el => {
      el.addEventListener('change', () => {
        const i = +el.dataset.i, f = el.dataset.f;
        config.devices[i][f] = el.type === 'number' ? (parseFloat(el.value) || 0) : el.value;
        save();
      });
      el.addEventListener('input', () => {
        if (el.dataset.f === 'name') {
          const hdr = document.querySelector(`#dev-card-${el.dataset.i} .dev-name`);
          if (hdr) hdr.textContent = el.value || `Device #${+el.dataset.i + 1}`;
        }
        if (el.dataset.f === 'model') {
          const badge = document.querySelector(`#dev-card-${el.dataset.i} .model-badge`);
          if (badge) badge.textContent = el.value;
        }
      });
    });

    /* Device boolean fields */
    document.querySelectorAll('.d-bool-field').forEach(cb => {
      cb.addEventListener('change', () => {
        const i = +cb.dataset.i, f = cb.dataset.f;
        config.devices[i][f] = cb.checked;
        cb.closest('.toggle-item').classList.toggle('checked', cb.checked);
        if (f === 'deviceEnabled') {
          const badge = document.querySelector(`#dev-card-${i} .status-badge`);
          if (badge) {
            badge.className = `status-badge ${cb.checked ? 'enabled' : 'disabled'}`;
            badge.textContent = cb.checked ? (t.deviceEnabled || 'Enabled') : (t.deviceDisabled || 'Disabled');
          }
        }
        save();
      });
    });

    /* MiCloud override toggle */
    document.querySelectorAll('.ovr-toggle-cb').forEach(cb => {
      cb.addEventListener('change', () => {
        const i = +cb.dataset.i;
        config.devices[i]._micloudOverride = cb.checked;
        const sec = document.getElementById(`ovr-fields-${i}`);
        if (sec) sec.style.display = cb.checked ? '' : 'none';
        if (!cb.checked) {
          delete config.devices[i].micloud;
        } else {
          if (!config.devices[i].micloud) config.devices[i].micloud = {};
        }
        save();
      });
    });

    /* MiCloud override fields */
    document.querySelectorAll('.ovr-field').forEach(el => {
      el.addEventListener('change', () => {
        const i = +el.dataset.i, f = el.dataset.f;
        if (!config.devices[i].micloud) config.devices[i].micloud = {};
        config.devices[i].micloud[f] = el.value;
        save();
      });
    });

    /* Advanced toggle */
    document.querySelectorAll('.adv-toggle-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const i = +btn.dataset.i;
        const sec = document.getElementById(`adv-sec-${i}`);
        const chev = btn.querySelector('.adv-chevron');
        if (advExpanded.has(i)) {
          advExpanded.delete(i);
          if (sec) sec.style.display = 'none';
          if (chev) chev.classList.remove('open');
        } else {
          advExpanded.add(i);
          if (sec) sec.style.display = '';
          if (chev) chev.classList.add('open');
        }
      });
    });
  }

  render();
})();
</script>
