<style>
  :root {
    --accent:        #0095c8;
    --accent-light:  rgba(0,149,200,0.10);
    --accent-border: rgba(0,149,200,0.28);
    --success:       #16a34a;
    --success-light: rgba(22,163,74,0.08);
    --success-border:rgba(22,163,74,0.22);
    --warn:          #a16207;
    --warn-light:    rgba(161,98,7,0.08);
    --warn-border:   rgba(161,98,7,0.25);
    --text:          #1a1a2e;
    --text-muted:    #6b7280;
    --border:        #e5e7eb;
    --card-bg:       #f9fafb;
    --input-bg:      #ffffff;
    --bg:            #ffffff;
    --danger:        #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent:        #00b4d8;
      --accent-light:  rgba(0,180,216,0.08);
      --accent-border: rgba(0,180,216,0.26);
      --success:       #4ade80;
      --success-light: rgba(74,222,128,0.08);
      --success-border:rgba(74,222,128,0.22);
      --warn:          #facc15;
      --warn-light:    rgba(250,204,21,0.08);
      --warn-border:   rgba(250,204,21,0.22);
      --text:          #e2e8f0;
      --text-muted:    #94a3b8;
      --border:        #334155;
      --card-bg:       rgba(255,255,255,0.05);
      --input-bg:      rgba(255,255,255,0.08);
      --bg:            transparent;
      --danger:        #f87171;
    }
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html,body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:14px; color:var(--text); background:var(--bg)!important; }

  .fg    { margin-bottom:12px; }
  label  { display:block; font-weight:600; font-size:13px; margin-bottom:4px; color:var(--text); }
  input[type="text"],input[type="number"],input[type="password"],select {
    width:100%; height:36px; padding:0 10px; border:1px solid var(--border);
    border-radius:6px; font-size:13px; background:var(--input-bg); color:var(--text); transition:border-color .15s;
  }
  input:focus,select:focus { outline:none; border-color:var(--accent); }
  select option { background:var(--input-bg); color:var(--text); }

  .btn { padding:7px 14px; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; transition:opacity .15s; }
  .btn:hover { opacity:.85; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-outline  { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  .btn-outline:hover { background:var(--accent); color:#fff; opacity:1; }
  .btn-warn     { background:transparent; color:var(--warn);   border:1px solid var(--warn); }
  .btn-warn:hover   { background:var(--warn); color:#fff; opacity:1; }
  .btn-danger   { background:transparent; color:var(--danger); border:1px solid var(--danger); }
  .btn-danger:hover { background:var(--danger); color:#fff; opacity:1; }
  .btn-sm { padding:4px 10px; font-size:11px; }

  /* Credentials card */
  .creds-card   { border:1.5px solid var(--accent-border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
  .creds-header { padding:11px 18px; background:var(--accent-light); font-size:13px; font-weight:700; color:var(--accent); border-bottom:1px solid var(--accent-border); cursor:pointer; user-select:none; display:flex; justify-content:space-between; align-items:center; text-transform:uppercase; letter-spacing:.6px; }
  .creds-body   { padding:14px 18px 16px; }
  .creds-grid   { display:grid; grid-template-columns:1fr 1fr 130px 110px; gap:8px; align-items:flex-end; }
  @media(max-width:620px){ .creds-grid{ grid-template-columns:1fr 1fr; } }

  /* Status line */
  .status { font-size:12px; font-weight:500; color:var(--text-muted); display:block; margin-top:8px; }
  .status.ok  { color:var(--success); }
  .status.err { color:var(--danger); }

  /* Verify box */
  .verify-box { display:none; margin-top:10px; padding:12px 14px; border-radius:8px; border:1px solid var(--warn-border); background:var(--warn-light); font-size:12px; line-height:1.7; }
  .verify-box strong { display:block; margin-bottom:4px; }
  .verify-actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; align-items:center; }

  /* Section */
  .section-hd { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); margin:16px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); text-align:center; border-bottom:none; padding-bottom:0; }

  /* Device card */
  .device-card { border:1.5px solid var(--accent-border); border-radius:12px; margin-bottom:12px; background:var(--accent-light); overflow:hidden; }
  .device-header { display:flex; justify-content:space-between; align-items:center; padding:11px 16px; cursor:pointer; user-select:none; }
  .device-header:hover { opacity:.88; }
  .device-header-left { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .chevron { font-size:11px; color:var(--text-muted); transition:transform .2s; flex-shrink:0; }
  .chevron.open { transform:rotate(90deg); }
  .dev-name { font-size:14px; font-weight:700; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .model-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; flex-shrink:0; background:var(--accent-light); color:var(--accent); border:1px solid var(--accent-border); font-family:monospace; }
  .status-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; flex-shrink:0; text-transform:uppercase; }
  .status-badge.on  { background:var(--success-light); color:var(--success); border:1px solid var(--success-border); }
  .status-badge.off { background:rgba(220,38,38,.08); color:var(--danger); border:1px solid rgba(220,38,38,.22); }
  .device-body { padding:14px 16px 18px; border-top:1px solid var(--accent-border); }
  .device-body.collapsed { display:none; }

  .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .fieldset { border:1px solid var(--border); border-radius:8px; padding:12px 12px 10px; }

  .toggle-row  { display:flex; gap:6px; }
  .toggle-item { flex:1; min-width:0; display:flex; align-items:center; justify-content:center; gap:5px; padding:7px 4px; border-radius:7px; border:1px solid var(--border); background:var(--card-bg); cursor:pointer; font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; transition:border-color .15s,background .15s; }
  .toggle-item:hover { border-color:var(--accent); }
  .toggle-item input[type="checkbox"] { width:13px; height:13px; accent-color:var(--accent); flex-shrink:0; cursor:pointer; }
  .toggle-item.checked { border-color:var(--accent-border); background:var(--accent-light); }
  .feat-toggle { color:var(--text-muted); cursor:pointer; }
  .feat-toggle:not(.checked):hover { border-color:#9ca3af; }
  .feat-toggle.checked { background:#16a34a; border-color:#16a34a; color:#fff; font-weight:600; }

  /* Device status segmented control (ON / OFF) */
  .conn-toggle { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; height:36px; }
  .conn-btn { flex:1; padding:0 12px; border:none; background:transparent; cursor:pointer; font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; justify-content:center; gap:5px; transition:background .15s,color .15s; text-transform:uppercase; letter-spacing:.4px; }
  .conn-btn + .conn-btn { border-left:1px solid var(--border); }
  .conn-btn.active-on  { background:var(--success-light); color:var(--success); }
  .conn-btn.active-off { background:rgba(220,38,38,.08);  color:var(--danger); }
</style>

<div id="app"></div>

<script src="device-features.js"></script>
<script>
(async () => {
  window.addEventListener('error', ev => {
    const a = document.getElementById('app');
    if (a && !a.innerHTML.trim()) a.innerHTML = `<div style="color:#dc2626;padding:16px">UI error: ${ev.message}</div>`;
  });

  /* ── Config ── */
  let config = {};
  try { const c = await homebridge.getPluginConfig(); config = c[0] || {}; } catch {}
  if (!config.micloud)  config.micloud  = {};
  if (!config.devices)  config.devices  = [];

  const expanded = new Set();
  let credsCollapsed = !!config.micloud.username;
  const app = document.getElementById('app');

  function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML.replace(/"/g,'&quot;'); }
  function bool(v, def=true)  { return v===undefined ? def : !!v; }
  function boolF(v)           { return v===undefined ? false : !!v; }
  async function save()       { await homebridge.updatePluginConfig([config]); }

  /* Country opts — only used in per-device MiCloud override section */
  const COUNTRIES = ['cn','de','sg','tw','us','ru','in','i2'];
  const CNAMES    = { cn:'China', de:'Germany', sg:'Singapore', tw:'Taiwan', us:'USA', ru:'Russia', in:'India', i2:'i2' };
  const countryOpts = sel => COUNTRIES.map(c => `<option value="${c}" ${sel===c?'selected':''}>${esc(CNAMES[c]||c)}</option>`).join('');

  /* DEVICE_FEATURES — device-features.js faylından yüklənir */

  function featToggles(d, i) {
    const features = DEVICE_FEATURES[d.model];
    if (!features) return '';

    return `<div class="toggle-row" style="margin-top:8px;flex-wrap:wrap">
      ${features.map(f => {
        const val = d[f.key] === true;
        return `<div class="toggle-item feat-toggle ${val?'checked':''}" data-i="${i}" data-k="${f.key}" style="flex:1 1 70px">${f.label}</div>`;
      }).join('')}
    </div>`;
  }

  /* ── Device card ── */
  function renderDevice(d, i) {
    const open = expanded.has(i);
    const en   = bool(d.deviceEnabled, true);
    return `
      <div class="device-card" id="dev-card-${i}">
        <div class="device-header device-toggle" data-i="${i}">
          <div class="device-header-left">
            <span class="chevron ${open?'open':''}">&#9654;</span>
            <span class="dev-name">${esc(d.name||`Device #${i+1}`)}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0;margin-left:8px">
            <span class="status-badge ${en?'on':'off'}">${en?'Enabled':'Disabled'}</span>
            <button class="btn btn-danger btn-sm btn-remove" data-i="${i}">Remove</button>
          </div>
        </div>
        <div class="device-body ${open?'':'collapsed'}">

          <!-- Row 1: Name + Device Status -->
          <div class="fieldset" style="margin-bottom:12px">
            <div class="row-2">
              <div class="fg" style="margin-bottom:0">
                <label>Device Name</label>
                <input type="text" class="d-field" data-i="${i}" data-f="name" value="${esc(d.name||'')}">
              </div>
              <div class="fg" style="margin-bottom:0">
                <label>Device Status</label>
                <div class="conn-toggle">
                  <button class="conn-btn ${en?'active-on':''} status-pick" data-i="${i}" data-v="on">ON</button>
                  <button class="conn-btn ${!en?'active-off':''} status-pick" data-i="${i}" data-v="off">OFF</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Row 2: IP + Token -->
          <div class="fieldset" style="margin-bottom:12px">
            <div class="row-2">
              <div class="fg" style="margin-bottom:0">
                <label>IP Address</label>
                <input type="text" class="d-field" data-i="${i}" data-f="ip" value="${esc(d.ip||'')}" placeholder="192.168.1.100">
              </div>
              <div class="fg" style="margin-bottom:0">
                <label>Token</label>
                <input type="password" class="d-field" data-i="${i}" data-f="token" value="${esc(d.token||'')}">
              </div>
            </div>
          </div>

          <!-- Row 3: Model + Device ID -->
          <div class="fieldset">
            <div class="row-2">
              <div class="fg" style="margin-bottom:0">
                <label>Model <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
                <input type="text" class="d-field" data-i="${i}" data-f="model" value="${esc(d.model||'')}" placeholder="dmaker.fan.p5">
              </div>
              <div class="fg" style="margin-bottom:0">
                <label>Device ID <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
                <input type="text" class="d-field" data-i="${i}" data-f="deviceId" value="${esc(d.deviceId||'')}" placeholder="auto">
              </div>
            </div>
          </div>

          ${featToggles(d, i)}

        </div>
      </div>`;
  }

  /* ── Render ── */
  /* Hər cihazın feature key-lərini açıqca false ilə başlat (undefined → homebridge-miot true sayır) */
  function normalizeFeatures() {
    let changed = false;
    (config.devices || []).forEach(d => {
      const features = DEVICE_FEATURES[d.model];
      if (!features) return;
      features.forEach(f => {
        if (d[f.key] === undefined || d[f.key] === null) {
          d[f.key] = false;
          changed = true;
        }
      });
    });
    if (changed) save();
  }

  function render() {
    normalizeFeatures();
    const mc = config.micloud || {};
    app.innerHTML = `
      <div class="creds-card">
        <div class="creds-header" id="creds-toggle">
          <span style="flex:1;text-align:center">Cloud Credentials</span>
          <span style="font-size:11px;display:inline-block;transform:rotate(${credsCollapsed?'0':'180'}deg)">▼</span>
        </div>
        <div class="creds-body" id="creds-body" style="${credsCollapsed?'display:none':''}">
          <div class="creds-grid" style="grid-template-columns:1fr 1fr 130px">
            <div class="fg" style="margin-bottom:0"><label>Username</label><input type="text" id="g-user" value="${esc(mc.username||'')}" placeholder="user@example.com"></div>
            <div class="fg" style="margin-bottom:0"><label>Password</label><input type="password" id="g-pass" value="${esc(mc.password||'')}"></div>
            <div class="fg" style="margin-bottom:0"><button class="btn btn-primary" id="btn-discover" style="height:36px;width:100%;white-space:nowrap">🔍 Fetch</button></div>
          </div>
          <span class="status" id="discover-status"></span>

          <!-- Security check box -->
          <div class="verify-box" id="verify-box">
            <strong>🔐 Verification Required</strong>
            <span id="verify-hint" style="display:block;color:var(--text-muted);margin-bottom:8px"></span>
            <!-- STS: open link → plugin polls automatically -->
            <div id="sts-section">
              <div class="verify-actions">
                <a id="verify-link" href="#" target="_blank" style="text-decoration:none">
                  <button class="btn btn-warn btn-sm">🔗 Open Verification Page</button>
                </a>
                <span id="poll-status" style="font-size:11px;color:var(--text-muted)"></span>
                <button class="btn btn-outline btn-sm" id="btn-try-again" style="display:none">↺ Try Again</button>
              </div>
            </div>
            <!-- Identity: open link to receive code, then enter code in plugin -->
            <div id="otp-section" style="display:none">
              <div class="verify-actions" style="margin-bottom:8px">
                <a id="verify-link-otp" href="#" target="_blank" style="text-decoration:none">
                  <button class="btn btn-warn btn-sm" type="button">🔗 Open Page to Receive Code</button>
                </a>
                <span style="color:var(--text-muted);font-size:11px">← visit first to get the code</span>
              </div>
              <div class="verify-actions">
                <input type="text" id="otp-input" placeholder="123456" maxlength="8"
                  style="width:110px;height:34px;font-family:monospace;font-size:16px;text-align:center;letter-spacing:3px">
                <button class="btn btn-primary btn-sm" id="btn-otp">✓ Submit Code</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-hd" style="margin-top:4px">Devices</div>
      <div id="device-list">${config.devices.map((d,i)=>renderDevice(d,i)).join('')}</div>
      <div class="fieldset" style="margin-top:10px">
        <button class="btn btn-primary" id="btn-add" style="width:100%;height:36px">+ Add Device</button>
      </div>
    `;
    bindEvents();
  }

  /* ── Triple-channel discover ──────────────────────────────────────────
   * Problem: homebridge.request() responses are sometimes dropped by the
   * Homebridge UI WebSocket layer (response never reaches the browser).
   *
   * Solution: three independent channels, whichever arrives first wins.
   *   1. Direct response  — homebridge.request() normal return value
   *   2. pushEvent        — server also fires pushEvent('xm-discover')
   *   3. Polling          — client polls /discover?action=poll every 800ms
   *                         (short requests rarely get dropped)
   * ─────────────────────────────────────────────────────────────────── */
  let _pushResolve = null;
  homebridge.addEventListener('xm-discover', (event) => {
    if (_pushResolve) { const fn = _pushResolve; _pushResolve = null; fn(event.data); }
  });

  async function discoverRequest(body) {
    return new Promise((resolve, reject) => {
      let done = false;
      const settle = (fn, val) => { if (!done) { done = true; clearInterval(pollTimer); fn(val); } };

      _pushResolve = (data) => settle(resolve, data); // channel 2: pushEvent

      // channel 1: direct request/response
      homebridge.request('/discover', body)
        .then(res => settle(resolve, res))
        .catch(err => settle(reject, err));

      // channel 3: polling — call /discover?action=poll every 800ms
      const pollTimer = setInterval(async () => {
        try {
          const r = await homebridge.request('/discover', { action: 'poll' });
          if (r && !r.pending) settle(resolve, r);
        } catch(e) { settle(reject, e); }
      }, 800);
    });
  }

  /* ── Polling state ── */
  let _pollTimer = null, _pollCount = 0;
  const MAX_POLLS = 15, POLL_MS = 4000;

  function stopPoll() { if (_pollTimer) { clearTimeout(_pollTimer); _pollTimer = null; } }

  function startPoll() {
    stopPoll(); _pollCount = 0;
    document.getElementById('btn-try-again').style.display = 'none';
    schedulePoll();
  }

  function schedulePoll() { _pollTimer = setTimeout(doPoll, POLL_MS); }

  async function doPoll() {
    _pollTimer = null; _pollCount++;
    const pollEl = document.getElementById('poll-status');
    if (pollEl) pollEl.textContent = `Checking… (${_pollCount}/${MAX_POLLS})`;
    try {
      const res = await discoverRequest({ action: 'retry' });
      if (res?.verificationRequired) {
        const link = document.getElementById('verify-link');
        if (link && res.verificationUrl) link.href = res.verificationUrl;
        if (_pollCount >= MAX_POLLS) {
          if (pollEl) pollEl.textContent = '';
          showStatus('err', '⏱️ Timed out. Open the link again and re-approve, then click Try Again.');
          document.getElementById('btn-try-again').style.display = '';
        } else { schedulePoll(); }
      } else {
        document.getElementById('verify-box').style.display = 'none';
        stopPoll();
        onDevices(res);
      }
    } catch(e) {
      stopPoll();
      showStatus('err', '✗ ' + (e.message||e));
      document.getElementById('verify-box').style.display = 'none';
    }
  }

  function showStatus(type, msg) {
    const el = document.getElementById('discover-status');
    if (el) { el.className = `status ${type}`; el.textContent = msg; }
  }

  function showVerifyBox(res) {
    const box       = document.getElementById('verify-box');
    const hint      = document.getElementById('verify-hint');
    const stsSection = document.getElementById('sts-section');
    const otpSection = document.getElementById('otp-section');
    if (!box) return;
    box.style.display = 'block';

    if (res.verifyType === 'identity') {
      if (hint) hint.textContent = 'Xiaomi sent a verification code to your phone or email. Open the link to receive the code, then enter it below.';
      const otpLink = document.getElementById('verify-link-otp');
      if (otpLink && res.verificationUrl) otpLink.href = res.verificationUrl;
      if (stsSection) stsSection.style.display = 'none';
      if (otpSection) otpSection.style.display = '';
      stopPoll();
    } else {
      if (hint) hint.textContent = 'Xiaomi detected a login from a new IP. Open the link, approve the login, then the plugin will detect it automatically.';
      const link = document.getElementById('verify-link');
      if (link && res.verificationUrl) link.href = res.verificationUrl;
      if (stsSection) stsSection.style.display = '';
      if (otpSection) otpSection.style.display = 'none';
      startPoll();
    }
  }

  function onDevices(res) {
    const found = res?.devices || [];
    if (!found.length) { showStatus('err', '🔍 No devices with local IP and token found.'); return; }
    const existingIps = new Set(config.devices.map(d => d.ip).filter(Boolean));
    let added = 0;
    for (const d of found) {
      if (d.localip && existingIps.has(d.localip)) continue;
      config.devices.push({
        name: d.name || d.model || 'Xiaomi Device',
        ip: d.localip || '', token: d.token || '', model: d.model || '', deviceId: d.did || '',
        pollingInterval: 5000, deviceEnabled: true,
      });
      if (d.localip) existingIps.add(d.localip);
      added++;
    }
    // Render FIRST so the status message lands in the fresh DOM, not the old one.
    // Also force credentials section open so the status line is visible.
    if (added > 0) { credsCollapsed = false; render(); save(); }
    showStatus('ok', `✓ Found ${found.length} device(s). ${added} new added.`);
  }

  /* ── Events ── */
  function bindEvents() {
    const gUser = document.getElementById('g-user');
    const gPass = document.getElementById('g-pass');
    document.getElementById('creds-toggle').addEventListener('click', () => { credsCollapsed = !credsCollapsed; render(); });

    if (gUser) gUser.addEventListener('change', () => { config.micloud.username = gUser.value; save(); });
    if (gPass) gPass.addEventListener('change', () => { config.micloud.password = gPass.value; save(); });

    /* Discover */
    document.getElementById('btn-discover').addEventListener('click', async () => {
      stopPoll();
      const username = gUser?.value.trim() || '';
      const password = gPass?.value.trim() || '';
      if (!username || !password) { showStatus('err', '⚠️ Username & Password required.'); return; }
      const btn = document.getElementById('btn-discover');
      btn.disabled = true; btn.textContent = '⏳ Fetching…';
      showStatus('', '');
      document.getElementById('verify-box').style.display = 'none';
      try {
        // 30-second timeout — if both WebSocket channels fail the button won't stay frozen.
        const timeout = new Promise((_, rej) =>
          setTimeout(() => rej(new Error('Timed out. Please refresh the page and try again.')), 30000)
        );
        const res = await Promise.race([
          discoverRequest({ username, password }),
          timeout,
        ]);
        if (res?.verificationRequired) { showStatus('err', '🔐 Security check required.'); showVerifyBox(res); }
        else onDevices(res);
      } catch(e) { showStatus('err', '✗ ' + (e.message||e)); }
      finally {
        // btn may be detached if render() was called inside onDevices — grab fresh ref
        const freshBtn = document.getElementById('btn-discover');
        if (freshBtn) { freshBtn.disabled = false; freshBtn.innerHTML = '🔍 Fetch'; }
      }
    });

    /* OTP submit — sends code to Xiaomi API via plugin */
    const otpBtn = document.getElementById('btn-otp');
    if (otpBtn) otpBtn.addEventListener('click', async () => {
      const code = (document.getElementById('otp-input')?.value || '').trim();
      if (!code) { showStatus('err', '⚠️ Enter the verification code.'); return; }
      otpBtn.disabled = true; otpBtn.textContent = '⏳';
      showStatus('', 'Verifying…');
      try {
        const res = await discoverRequest({ action: 'otp', otp: code });
        if (res?.verificationRequired) { showStatus('err', '✗ Code incorrect or expired. Try again.'); showVerifyBox(res); }
        else { document.getElementById('verify-box').style.display = 'none'; onDevices(res); }
      } catch(e) { showStatus('err', '✗ ' + (e.message || e)); }
      finally { otpBtn.disabled = false; otpBtn.textContent = '✓ Submit Code'; }
    });

    /* Try Again after poll timeout */
    const tryAgainBtn = document.getElementById('btn-try-again');
    if (tryAgainBtn) tryAgainBtn.addEventListener('click', () => { tryAgainBtn.style.display='none'; startPoll(); });


    /* Device toggle */
    document.querySelectorAll('.device-toggle').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.closest('.btn,input,select')) return;
        const i = +el.dataset.i;
        expanded.has(i) ? expanded.delete(i) : expanded.add(i);
        render();
      });
    });

    /* Add device */
    document.getElementById('btn-add').addEventListener('click', () => {
      const i = config.devices.length;
      config.devices.push({ name:'', ip:'', token:'', model:'', deviceId:'', pollingInterval:5000, deviceEnabled:true });
      expanded.add(i); render(); save();
    });

    /* Remove device */
    document.querySelectorAll('.btn-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const i = +btn.dataset.i;
        config.devices.splice(i, 1);
        const reIdx = s => { const n=new Set(); s.forEach(v => { if(v<i) n.add(v); else if(v>i) n.add(v-1); }); s.clear(); n.forEach(v=>s.add(v)); };
        reIdx(expanded);
        render(); save();
      });
    });

    /* Text/number fields */
    document.querySelectorAll('.d-field').forEach(el => {
      el.addEventListener('change', () => {
        const i=+el.dataset.i, f=el.dataset.f;
        config.devices[i][f] = el.type==='number' ? (parseFloat(el.value)||0) : el.value;
        save();
        if (f === 'model') render();
      });
      el.addEventListener('input', () => {
        if (el.dataset.f==='name') { const h=document.querySelector(`#dev-card-${el.dataset.i} .dev-name`); if(h) h.textContent=el.value||`Device #${+el.dataset.i+1}`; }
        if (el.dataset.f==='model') { const b=document.querySelector(`#dev-card-${el.dataset.i} .model-badge`); if(b) b.textContent=el.value; }
      });
    });

    /* Feature toggles */
    document.querySelectorAll('.feat-toggle').forEach(el => {
      el.addEventListener('click', () => {
        const i = +el.dataset.i, k = el.dataset.k;
        const val = !el.classList.contains('checked');
        config.devices[i][k] = val;
        el.classList.toggle('checked', val);
        save();
      });
    });

    /* Device Status segmented (ON / OFF) */
    document.querySelectorAll('.status-pick').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const i = +btn.dataset.i;
        const enabled = btn.dataset.v === 'on';
        config.devices[i].deviceEnabled = enabled;
        /* update header badge */
        const badge = document.querySelector(`#dev-card-${i} .status-badge`);
        if (badge) { badge.className = `status-badge ${enabled?'on':'off'}`; badge.textContent = enabled?'Enabled':'Disabled'; }
        /* update button states without full re-render */
        btn.closest('.conn-toggle').querySelectorAll('.conn-btn').forEach(b => {
          b.classList.remove('active-on','active-off');
        });
        btn.classList.add(enabled ? 'active-on' : 'active-off');
        save();
      });
    });

  }

  render();
})();
</script>
